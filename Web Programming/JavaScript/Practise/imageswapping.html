<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<link rel="stylesheet" href="imageswapping.css">
<script>
    document.addEventListener("DOMContentLoaded",function(){
        image=document.getElementsByClassName("image")
        for(i=0;i<image.length;i++)
        {
            image[i].addEventListener("click",function()
        {
            temp=document.getElementById("dest").src
            document.getElementById("dest").src=this.src//current image store to dest
            this.src=temp
        })
        }
    })
</script>
<body>
    <div class="imagecontainer">
        <img src="image.png" id="dest" width="400px" alt="">
    </div>
    <div>
        <img src="image copy 2.png" width="300px" class="image" alt="">
        <img src="image copy 4.png" width="300px" class="image" alt="">
        <img src="image copy 3.png" width="300px" class="image" alt="">
        <img src="image copy.png" width="300px" class="image" alt="">
    </div>
</body>
</html>
